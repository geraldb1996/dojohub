name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Permite ejecutar manualmente
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build Dojo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del Dojo 🥋
        uses: actions/checkout@v4

      - name: Instalar pnpm (tu regla de oro)
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Instalar dependencias 📜
        run: pnpm install

      - name: Construir el Dojo (Static Build) 🧱
        run: pnpm run build
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}

      - name: Preparar artefactos para GitHub Pages 📤
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Publicar en la Web ⛩️
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: ¡Despliegue final! 🚀
        id: deployment
        uses: actions/deploy-pages@v4
